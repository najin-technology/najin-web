    <rect x="0" y="0" width="8" height="35" rx="1" fill="#003B7E"/>
    <rect x="22" y="0" width="8" height="35" rx="1" fill="#003B7E"/>
    <rect x="6" y="12" width="18" height="8" rx="1" fill="#003B7E"/>
